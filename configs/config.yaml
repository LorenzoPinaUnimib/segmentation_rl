# ============================================================
# Brain Tumor Segmentation — Configuration
# ============================================================

seed: 42
device: "cpu"  # auto | cpu | cuda | dml (DirectML, richiede torch-directml)
# NOTA OTTIMIZZAZIONE: era "cpu" fisso — un forward CNN ad ogni step RL
# (fino a 100 step/episodio x tutte le immagini x centinaia di iterazioni)
# e' enormemente piu' lento su CPU. "auto" seleziona CUDA/DirectML se disponibili,
# permettendo MOLTE piu' iterazioni nello stesso tempo budget.

# ----------------------------------------------------------
# Dataset
# ----------------------------------------------------------
dataset:
  source: "kaggle"          # kaggle | local | synthetic
  kaggle_id: "pkdarabi/brain-tumor-image-dataset-semantic-segmentation"
  local_path: null             # path to local root if source=local
  image_size: [256, 256]       # [H, W] all images resized to this
  num_classes: 1               # 1 = binary segmentation
  in_channels: 3
  train_ratio: 0.70
  val_ratio:   0.15
  test_ratio:  0.15
  cache_pairs: true            # cache (img_path, mask_path) pairs to CSV

# ----------------------------------------------------------
# Preprocessing
# ----------------------------------------------------------
preprocessing:
  normalization: "per_image"   # z_score | min_max | per_image
  binarize_mask: true          # threshold mask to {0,1}
  mask_threshold: 0.5

# ----------------------------------------------------------
# Augmentation  (train only)
# ----------------------------------------------------------
augmentation:
  enabled: true
  horizontal_flip: 0.5
  vertical_flip:   0.3
  rotate_limit:    15
  brightness_limit: 0.15
  contrast_limit:   0.15
  noise_var_limit: [5.0, 20.0]

# ----------------------------------------------------------
# U-Net baseline
# ----------------------------------------------------------
unet:
  depth: 4
  init_filters: 32
  dropout: 0.2
  activation: "relu"
  norm: "batch"

# ----------------------------------------------------------
# Training — baseline
# ----------------------------------------------------------
training:
  epochs: 30
  batch_size: 8
  lr: 1.0e-4
  weight_decay: 1.0e-5
  loss: "bce_dice"             # bce_dice | focal_dice
  dice_weight: 0.5
  bce_weight:  0.5
  early_stopping_patience: 10
  grad_clip: 1.0
  num_workers: 2

# ----------------------------------------------------------
# RL
# ----------------------------------------------------------
rl:
  mode: "refinement"           # refinement | selector
  episodes: 300
  max_steps_per_episode: 8
  gamma: 0.99
  lr: 1.0e-4
  epsilon_start: 1.0
  epsilon_end:   0.05
  epsilon_decay: 50           # fallback legacy (usato solo se le chiavi
                               # roi_epsilon_decay / refine_epsilon_decay sotto
                               # non sono presenti)
  refine_epsilon_decay: 150   # OTTIMIZZAZIONE: prima ereditava epsilon_decay=50
                               # condiviso col finder -> con refine_episodes=300
                               # l'agente perdeva l'esplorazione entro il 15% del
                               # training (troppo presto -> policy sub-ottimale).
  replay_buffer_size: 20000   # OTTIMIZZAZIONE: 5000 era piccolo per la varieta'
                               # di stati su un intero dataset per centinaia di
                               # iterazioni -> overwrite troppo rapido di
                               # esperienze utili (specie casi difficili).
  batch_size: 32
  target_update_freq: 20       # episodes between target net updates
  num_actions: 8
  # State features
  feature_dim: 64
  hidden_dim: 128
  # Reward shaping
  reward_dice_weight:     1.0
  reward_iou_weight:      0.5
  reward_fragment_penalty: 0.3
  reward_step_penalty:    0.02
  reward_terminal_weight: 2.0
  # Checkpoint selection during training uses val set metrics (not test).
  eval_on_full_val: true
  # Prioritized Experience Replay: pesa di piu' le transizioni con TD-error alto
  # (tipicamente i casi difficili: tumori piccoli/periferici/basso contrasto),
  # invece di campionare uniformemente dal replay buffer.
  use_prioritized_replay: true
  per_alpha: 0.6
  per_beta_start: 0.4
  per_beta_frames: 20000

  # ----------------------------------------------------------
  # ROI Finder (Agent 1) — Q-network CNN
  # ----------------------------------------------------------
  # Lo stato osservato dall'agente NON è più un vettore di 20 feature
  # scalari: è un'immagine a 2 canali (immagine ridimensionata + box
  # corrente) consumata da una piccola CNN dueling (vedi src/rl/agent_roi.py).
  roi_cnn_size: 72            # OTTIMIZZAZIONE: 48 -> 72. A 48px molti tumori
                              # piccoli/periferici diventano quasi invisibili
                              # dopo il downsample, ponendo un tetto basso
                              # indipendente dalla qualita' dell'agente.
                              # Con device "auto" (GPU) il costo aggiuntivo e'
                              # trascurabile rispetto al beneficio.
  roi_state_channels: 3        # OTTIMIZZAZIONE: 2 -> 3. Aggiunge un canale di
                              # gradiente/edge (Sobel) accanto a immagine+box,
                              # per dare all'agente un segnale esplicito sui
                              # bordi del tumore, non solo l'intensita' grezza.
  roi_conv_channels: [32, 64, 128]  # OTTIMIZZAZIONE: rete un po' piu' capiente
                              # (16,32,64 era sottodimensionata per un task
                              # quasi-percettivo come la localizzazione).
  roi_hidden_dim: 256         # dimensione FC delle teste value/advantage
  roi_lr: 3.0e-4              # leggermente piu' basso: rete piu' grande
                              # richiede LR piu' cauto per stabilita'.
  roi_episodes: 400           # OTTIMIZZAZIONE: qualche iterazione in piu' dato
                              # che ora il training e' molto piu' veloce su GPU.
  roi_max_steps: 70           # ridotto da 100: con box iniziale randomizzato +
                              # step adattivo coarse-to-fine, 70 step bastano e
                              # accorciano ogni episodio (piu' iterazioni/ora).
  roi_step_penalty: 0.01
  roi_terminal_weight: 3.0
  roi_epsilon_decay: 150      # OTTIMIZZAZIONE: decadimento dedicato (invece di
                              # ereditare epsilon_decay=50 condiviso), coerente
                              # con roi_episodes=400 (esplorazione per ~35-40%
                              # del training invece che ~15%).
  roi_random_init: true        # OTTIMIZZAZIONE CHIAVE: il box iniziale NON è più
                              # sempre centrato uguale per ogni immagine — viene
                              # randomizzato (posizione+scala) ad ogni episodio
                              # di TRAINING (l'eval resta deterministica, box
                              # centrato). Elimina il bias per tumori centrali
                              # e forza l'agente a imparare vera localizzazione.
  roi_random_init_scale_range: [0.25, 0.6]   # frazione lato immagine
  roi_random_init_center_jitter: 0.3          # frazione immagine di jitter centro
  # OTTIMIZZAZIONE (fix regressione): curriculum sulla randomizzazione, invece
  # di applicarla al 100% fin dal primo episodio. Osservato empiricamente che
  # randomizzare subito il box mentre la rete non ha ancora imparato le basi
  # (dove si trova il box rispetto all'immagine) causa instabilita' e un calo
  # del Val IoU tra checkpoint successivi. Il curriculum tiene il box centrato
  # (comportamento originale) per i primi episodi, poi introduce gradualmente
  # la randomizzazione una volta che la rete ha una base solida.
  roi_random_init_warmup_frac: 0.15   # primi 15% episodi: sempre box centrato
  roi_random_init_ramp_frac:   0.35   # rampa 0->100% randomizzazione tra il
                                       # 15% e il 50% degli episodi totali

  # ----------------------------------------------------------
  # ROI Refiner (Agent 2)
  # ----------------------------------------------------------
  refine_episodes: 400        # allineato a roi_episodes
  refine_max_steps: 20        # OTTIMIZZAZIONE: 10 -> 20. Con 8 azioni discrete
                              # (dilate/erode/smooth/soglia/...) 10 step erano
                              # spesso insufficienti per convergere su maschere
                              # irregolari; 20 da' piu' margine senza esplodere
                              # i tempi (episodio comunque breve, stato scalare).
  prob_method: "adaptive"     # adaptive | otsu

# ----------------------------------------------------------
# Evaluation
# ----------------------------------------------------------
evaluation:
  hausdorff: true
  save_predictions: true
  num_qualitative: 8

# ----------------------------------------------------------
# Output
# ----------------------------------------------------------
output:
  root: "outputs"
  checkpoint_dir: "outputs/checkpoints"
  log_dir:        "outputs/logs"
  metrics_dir:    "outputs/metrics"
  figures_dir:    "outputs/figures"
  predictions_dir: "outputs/predictions"
  reports_dir:    "outputs/reports"
